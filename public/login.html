<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVPN & WireGuard Manager — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        surface: '#121214',
                        border: '#27272a',
                        primary: '#00f0ff',
                        danger: '#ef4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'UI monospace', 'monospace']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== 3D Canvas Background ===== */
        #bg3d {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            display: block;
        }

        /* Full-screen overlays */
        .bg-vignette {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse at 50% 48%, transparent 25%, rgba(0,0,0,0.72) 100%);
        }
        .bg-scanlines {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px, transparent 3px,
                rgba(0,240,255,0.013) 3px, rgba(0,240,255,0.013) 4px
            );
        }

        /* ===== Orbital rings (CSS 3D) ===== */
        .orbital-container {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            perspective: 700px;
            display: flex; align-items: center; justify-content: center;
        }
        .orbital-ring {
            position: absolute;
            border-radius: 50%;
            transform-origin: center center;
        }
        .ring-1 {
            width: 340px; height: 340px;
            border: 1px solid rgba(0,240,255,0.20);
            animation: orbitSpin 13s linear infinite;
        }
        .ring-2 {
            width: 560px; height: 560px;
            border: 1px solid rgba(0,240,255,0.10);
            animation: orbitSpin 21s linear infinite reverse;
        }
        .ring-3 {
            width: 800px; height: 800px;
            border: 1px solid rgba(0,240,255,0.055);
            animation: orbitSpin 34s linear infinite;
        }
        @keyframes orbitSpin {
            0%   { transform: rotateX(72deg) rotateZ(0deg); }
            100% { transform: rotateX(72deg) rotateZ(360deg); }
        }

        /* ===== HUD corner brackets ===== */
        .hud-corner {
            position: fixed; width: 45px; height: 45px;
            pointer-events: none; z-index: 3;
        }
        .hud-tl { top: 18px; left: 18px;   border-top:    1.5px solid rgba(0,240,255,0.35); border-left:  1.5px solid rgba(0,240,255,0.35); }
        .hud-tr { top: 18px; right: 18px;  border-top:    1.5px solid rgba(0,240,255,0.35); border-right: 1.5px solid rgba(0,240,255,0.35); }
        .hud-bl { bottom: 18px; left: 18px;  border-bottom: 1.5px solid rgba(0,240,255,0.35); border-left:  1.5px solid rgba(0,240,255,0.35); }
        .hud-br { bottom: 18px; right: 18px; border-bottom: 1.5px solid rgba(0,240,255,0.35); border-right: 1.5px solid rgba(0,240,255,0.35); }

        .hud-dot {
            position: fixed; z-index: 3; pointer-events: none;
            width: 4px; height: 4px; border-radius: 50%;
            background: rgba(0,240,255,0.6);
            animation: blinkDot 2.8s ease-in-out infinite;
        }
        @keyframes blinkDot {
            0%,100% { opacity: 0.2; } 50% { opacity: 1; }
        }

        /* ===== Main content layer ===== */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #ffffff;
        }
        .login-root { position: relative; z-index: 4; }

        /* ===== 3D Card ===== */
        .card-3d-scene {
            perspective: 1200px;
            perspective-origin: 50% 38%;
        }
        .sci-fi-card {
            background: rgba(12, 12, 14, 0.88);
            border: 1px solid rgba(39,39,42,0.9);
            border-radius: 0.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            will-change: transform;
            backdrop-filter: blur(18px) saturate(1.4);
            -webkit-backdrop-filter: blur(18px) saturate(1.4);
        }
        .sci-fi-card::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            opacity: 0.65;
        }
        .card-shimmer {
            position: absolute; inset: 0;
            border-radius: 0.5rem;
            pointer-events: none; z-index: 10;
            transition: background 0.08s ease;
        }

        /* ===== Inputs & Button ===== */
        .sci-fi-input {
            background: rgba(0,0,0,0.45);
            border: 1px solid #27272a;
            color: #e4e4e7;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            padding: 0.6rem 0.875rem;
            border-radius: 0.375rem;
            outline: none;
        }
        .sci-fi-input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 0 2px rgba(0,240,255,0.15), 0 0 14px rgba(0,240,255,0.08);
        }
        .sci-fi-input::placeholder { color: #52525b; }

        .sci-fi-button-primary {
            background: transparent;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            text-shadow: 0 0 8px rgba(0,240,255,0.5);
            box-shadow: inset 0 0 10px rgba(0,240,255,0.1);
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            width: 100%;
            cursor: pointer;
        }
        .sci-fi-button-primary:hover:not(:disabled) {
            background: rgba(0,240,255,0.1);
            box-shadow: inset 0 0 20px rgba(0,240,255,0.2), 0 0 22px rgba(0,240,255,0.5);
        }
        .sci-fi-button-primary:active:not(:disabled) { transform: scale(0.98); }
        .sci-fi-button-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(80%); }

        /* ===== Glitch text ===== */
        .glitch-wrapper { position: relative; display: inline-block; }
        .glitch-text { color: white; position: relative; z-index: 1; }
        .glitch-text::before {
            content: attr(data-text);
            position: absolute; top: 0; left: 0;
            color: #00f0ff; opacity: 0.7; z-index: -1;
            transform: translate(-2px, 2px);
            animation: glitch-anim 2.5s infinite alternate-reverse;
            pointer-events: none;
        }
        .glitch-text::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0;
            color: #ff00ea; opacity: 0.45; z-index: -2;
            transform: translate(2px, -2px);
            animation: glitch-anim2 3.1s infinite alternate;
            pointer-events: none;
        }
        .glitch-text.glitch-line2::before { animation: glitch-anim 1.8s 0.6s infinite alternate; }
        .glitch-text.glitch-line2::after  { animation: glitch-anim2 2.4s 1.1s infinite alternate-reverse; }
        @keyframes glitch-anim {
            0%   { clip-path: inset(10% 0 10% 0); }
            20%  { clip-path: inset(80% 0  5% 0); }
            40%  { clip-path: inset(20% 0 40% 0); }
            60%  { clip-path: inset(50% 0 30% 0); }
            80%  { clip-path: inset( 5% 0 80% 0); }
            100% { clip-path: inset(30% 0 10% 0); }
        }
        @keyframes glitch-anim2 {
            0%   { clip-path: inset(60% 0 10% 0); }
            25%  { clip-path: inset(10% 0 70% 0); }
            50%  { clip-path: inset(35% 0 35% 0); }
            75%  { clip-path: inset(90% 0  2% 0); }
            100% { clip-path: inset(15% 0 55% 0); }
        }

        /* Shield icon scan line */
        @keyframes scan {
            0%   { background-position: 0 -100vh; }
            100% { background-position: 0  100vh; }
        }
        .scan-lines {
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px, transparent 3px,
                rgba(0,240,255,0.04) 3px, rgba(0,240,255,0.04) 4px
            );
            animation: scan 5s linear infinite;
        }

        /* Shield icon 3D float */
        @keyframes iconFloat3d {
            0%,100% { transform: translateY(0)    rotateY(0deg);   filter: drop-shadow(0 0 8px  rgba(0,240,255,0.45)); }
            33%     { transform: translateY(-5px)  rotateY(10deg);  filter: drop-shadow(0 0 16px rgba(0,240,255,0.80)); }
            66%     { transform: translateY(-2px)  rotateY(-6deg);  filter: drop-shadow(0 0 12px rgba(0,240,255,0.60)); }
        }
        .icon-3d { animation: iconFloat3d 5s ease-in-out infinite; }

        /* Icon container pulse */
        @keyframes iconRingPulse {
            0%,100% { box-shadow: 0 0 18px rgba(0,240,255,0.30), 0 0 35px rgba(0,240,255,0.10); }
            50%     { box-shadow: 0 0 28px rgba(0,240,255,0.55), 0 0 60px rgba(0,240,255,0.20); }
        }
        .icon-ring { animation: iconRingPulse 3s ease-in-out infinite; }

        .error-msg {
            color: #fca5a5;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: rgba(239,68,68,0.08);
            border-left: 3px solid #ef4444;
            padding: 0.5rem 0.75rem;
            border-radius: 0 0.25rem 0.25rem 0;
        }
    </style>
</head>
<body>

    <!-- 3D WebGL Background -->
    <canvas id="bg3d"></canvas>

    <!-- Screen-space overlays -->
    <div class="bg-vignette"></div>
    <div class="bg-scanlines"></div>

    <!-- Orbital rings -->
    <div class="orbital-container">
        <div class="orbital-ring ring-1"></div>
        <div class="orbital-ring ring-2"></div>
        <div class="orbital-ring ring-3"></div>
    </div>

    <!-- HUD corner brackets -->
    <div class="hud-corner hud-tl"></div>
    <div class="hud-corner hud-tr"></div>

    <div class="hud-corner hud-br"></div>

    <div class="hud-dot" style="top:70px;left:20px;animation-delay:0.9s;"></div>
    <div class="hud-dot" style="bottom:20px;right:70px;animation-delay:1.6s;"></div>
    <div class="hud-dot" style="bottom:70px;right:20px;animation-delay:0.4s;"></div>

    <!-- Main Login Content -->
    <div class="login-root min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm">

            <!-- Logo / Title -->
            <div class="text-center mb-10" data-aos="fade-down" data-aos-duration="700">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

            </p>

    </div>

    <!-- Auth Logic -->
    <script>
        const form     = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const btnLogin = document.getElementById('btnLogin');
        const btnLabel = document.getElementById('btnLabel');

        document.getElementById('togglePass').addEventListener('click', () => {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        (async () => {
            try {
                const r = await fetch('/api/status');
                if (r.ok) window.location.replace('/');
            } catch (_) {}
        })();

        function showError(msg) {
            errorMsg.textContent = '> ' + msg;
            errorMsg.classList.remove('hidden');
        }
        function hideError() { errorMsg.classList.add('hidden'); }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showError('Username and password are required.'); return; }
            btnLogin.disabled = true;
            btnLabel.textContent = 'Authenticating...';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    btnLabel.textContent = 'Access Granted \u2713';
                    setTimeout(() => window.location.replace('/'), 400);
                } else {
                    showError('Invalid credentials. Access denied.');
                    btnLogin.disabled = false;
                    btnLabel.textContent = 'Authenticate';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (err) {
                showError('Connection error. Server may be unreachable.');
                btnLogin.disabled = false;
                btnLabel.textContent = 'Authenticate';
            }
        });
    </script>

    <!-- Three.js 3D Background -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
    (function initScene() {
        const canvas = document.getElementById('bg3d');

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'low-power' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setClearColor(0x09090b, 1);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x09090b, 0.0055);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 350);
        camera.position.set(0, 0, 0);

        // Tunnel particles (main cyan field)
        const PCOUNT = window.innerWidth < 768 ? 1800 : 3200;
        const pGeo   = new THREE.BufferGeometry();
        const pPos   = new Float32Array(PCOUNT * 3);

        function spawnTunnel(i) {
            const angle = Math.random() * Math.PI * 2;
            const r     = 2.2 + Math.pow(Math.random(), 0.55) * 28;
            pPos[i * 3]     = Math.cos(angle) * r;
            pPos[i * 3 + 1] = Math.sin(angle) * r;
            pPos[i * 3 + 2] = -Math.random() * 260;
        }
        for (let i = 0; i < PCOUNT; i++) spawnTunnel(i);
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ color: 0x00e5ff, size: 0.1, transparent: true, opacity: 0.52, fog: true });
        scene.add(new THREE.Points(pGeo, pMat));

        // Brighter white highlight stars
        const HCOUNT = 180;
        const hGeo   = new THREE.BufferGeometry();
        const hPos   = new Float32Array(HCOUNT * 3);
        function spawnStar(i) {
            const angle = Math.random() * Math.PI * 2;
            const r     = 0.5 + Math.random() * 16;
            hPos[i * 3]     = Math.cos(angle) * r;
            hPos[i * 3 + 1] = Math.sin(angle) * r;
            hPos[i * 3 + 2] = -Math.random() * 260;
        }
        for (let i = 0; i < HCOUNT; i++) spawnStar(i);
        hGeo.setAttribute('position', new THREE.BufferAttribute(hPos, 3));
        const hMat = new THREE.PointsMaterial({ color: 0xe0ffff, size: 0.26, transparent: true, opacity: 0.85, fog: true });
        scene.add(new THREE.Points(hGeo, hMat));

        // Floating wireframe icosahedra
        const floatMeshes = [];
        [
            { detail: 1, size: 1.1 },
            { detail: 1, size: 0.7 },
            { detail: 0, size: 1.6 },
            { detail: 0, size: 0.9 },
            { detail: 1, size: 0.55 },
        ].forEach(({ detail, size }) => {
            const geo  = new THREE.IcosahedronGeometry(size, detail);
            const mat  = new THREE.MeshBasicMaterial({
                color: 0x00f0ff, wireframe: true,
                transparent: true, opacity: 0.12 + Math.random() * 0.1
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(
                (Math.random() - 0.5) * 22,
                (Math.random() - 0.5) * 14,
                -18 - Math.random() * 70
            );
            scene.add(mesh);
            floatMeshes.push({
                mesh,
                ry: (Math.random() - 0.5) * 0.012,
                rx: (Math.random() - 0.5) * 0.009
            });
        });

        // Mouse parallax
        let targetX = 0, targetY = 0, camX = 0, camY = 0;
        window.addEventListener('mousemove', e => {
            targetX = (e.clientX / window.innerWidth  - 0.5) *  4.5;
            targetY = (e.clientY / window.innerHeight - 0.5) * -2.8;
        });

        const SPEED_P = 0.20, SPEED_H = 0.36;

        function animate() {
            requestAnimationFrame(animate);

            const pa = pGeo.attributes.position.array;
            for (let i = 0; i < PCOUNT; i++) {
                pa[i * 3 + 2] += SPEED_P;
                if (pa[i * 3 + 2] > 6) spawnTunnel(i);
            }
            pGeo.attributes.position.needsUpdate = true;

            const ha = hGeo.attributes.position.array;
            for (let i = 0; i < HCOUNT; i++) {
                ha[i * 3 + 2] += SPEED_H;
                if (ha[i * 3 + 2] > 6) spawnStar(i);
            }
            hGeo.attributes.position.needsUpdate = true;

            for (const { mesh, ry, rx } of floatMeshes) {
                mesh.rotation.y += ry;
                mesh.rotation.x += rx;
            }

            camX += (targetX - camX) * 0.022;
            camY += (targetY - camY) * 0.022;
            camera.position.x = camX;
            camera.position.y = camY;
            camera.lookAt(camX * 0.08, camY * 0.08, -15);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>

    <!-- 3D Card Tilt -->
    <script>
    (function initCardTilt() {
        const card    = document.getElementById('loginCard');
        const scene3d = document.getElementById('cardScene');
        const shimmer = document.getElementById('cardShimmer');
        let resetTimer;

        scene3d.addEventListener('mousemove', e => {
            clearTimeout(resetTimer);
            const r  = card.getBoundingClientRect();
            const cx = r.left + r.width  / 2;
            const cy = r.top  + r.height / 2;
            const dx = (e.clientX - cx) / (r.width  / 2);
            const dy = (e.clientY - cy) / (r.height / 2);

            card.style.transform  = 'rotateY(' + (dx * 13) + 'deg) rotateX(' + (-dy * 9) + 'deg) translateZ(14px)';
            card.style.transition = 'transform 0.12s ease-out, box-shadow 0.12s ease-out';
            card.style.boxShadow  = (-dx * 12) + 'px ' + (dy * 7) + 'px 28px rgba(0,240,255,0.10), 0 22px 55px rgba(0,0,0,0.55)';

            shimmer.style.background = 'radial-gradient(circle at ' + (((dx+1)/2)*100) + '% ' + (((dy+1)/2)*100) + '%, rgba(0,240,255,0.09) 0%, transparent 62%)';
        });

        scene3d.addEventListener('mouseleave', () => {
            resetTimer = setTimeout(() => {
                card.style.transform  = 'rotateY(0deg) rotateX(0deg) translateZ(0px)';
                card.style.transition = 'transform 0.55s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease-out';
                card.style.boxShadow  = '';
                shimmer.style.background = '';
            }, 55);
        });
    })();
    </script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 600, once: true, easing: 'ease-out-quart' });</script>
</body>
